<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-success navbar-expand">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🌱 OptiCrop</span>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Recommend</a>
                <a class="nav-link" href="/compare">Compare Crops</a>
                <a class="nav-link active" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/research">Research Insights</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h3 class="mb-1">Dataset Dashboard</h3>
        <p class="text-muted mb-4">Exploratory analysis of the 2,200-sample crop recommendation dataset (22 crops).</p>

        <div class="row g-4">
            <div class="col-lg-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title">Average N / P / K Needs by Crop</h6>
                        <img src="{{ url_for('static', filename='charts/npk_by_crop.png') }}" class="img-fluid rounded">
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h6 class="card-title">Feature Correlation Heatmap</h6>
                        <img src="{{ url_for('static', filename='charts/correlation_heatmap.png') }}" class="img-fluid rounded">
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h6 class="card-title">Rainfall vs Temperature (selected crops)</h6>
                        <img src="{{ url_for('static', filename='charts/rainfall_temp.png') }}" class="img-fluid rounded">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
